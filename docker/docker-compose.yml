version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bob_postgres
    environment:
      POSTGRES_USER: bob
      POSTGRES_PASSWORD: bob_secret
      POSTGRES_DB: bob_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bob_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
